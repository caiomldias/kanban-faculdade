<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organizador Diário de Tarefas Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              fiap: "#ef1761",
              "fiap-dark": "#c80f4c",
              ink: "#2f3136",
              "soft-pink": "#f2c8d7",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="min-h-screen bg-slate-100 text-ink">
    <div class="fixed inset-x-0 top-0 -z-10 h-56 bg-zinc-800"></div>

    <main class="mx-auto my-0 min-h-screen w-full bg-white p-[clamp(1rem,2vw,2rem)] shadow-2xl sm:my-8 sm:min-h-0 sm:w-[min(96vw,1600px)]">
      <section class="mb-6 grid gap-6 lg:grid-cols-[minmax(16rem,1fr)_minmax(18rem,0.8fr)] lg:items-end" aria-label="Resumo do quadro">
        <div>
          <p class="mb-2 text-xs font-extrabold uppercase tracking-[0.12em] text-fiap">Lista to-do diária</p>
          <h1 class="text-[clamp(2rem,5vw,4rem)] font-black uppercase leading-none">Organizador Diário de Tarefas Kanban</h1>
        </div>
        <div class="rounded-lg bg-fiap p-4">
          <label class="mb-2 block text-sm font-extrabold uppercase text-white" for="goal">Meta da sprint</label>
          <input class="h-10 w-full rounded-md border-0 px-3 text-ink outline-none ring-white/40 focus:ring-4" id="goal" type="text" placeholder="Ex: terminar APS e estudar calculo" />
        </div>
      </section>

      <section class="mb-5 grid gap-3 md:grid-cols-2 xl:grid-cols-[minmax(16rem,1.4fr)_minmax(10rem,0.8fr)_minmax(9rem,0.5fr)_minmax(9rem,0.5fr)_auto] xl:items-end" aria-label="Criar tarefa">
        <div>
          <label class="mb-1.5 block text-sm font-bold text-slate-500" for="task-title">Nova tarefa</label>
          <input class="h-11 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-fiap focus:ring-2 focus:ring-fiap/20" id="task-title" type="text" placeholder="Ex: revisar aula de Engenharia de Software" />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-bold text-slate-500" for="task-subject">Materia</label>
          <input class="h-11 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-fiap focus:ring-2 focus:ring-fiap/20" id="task-subject" type="text" placeholder="Ex: Metodos Ageis" />
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-bold text-slate-500" for="task-priority">Importancia</label>
          <select class="h-11 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-fiap focus:ring-2 focus:ring-fiap/20" id="task-priority">
            <option value="Alta">Alta</option>
            <option value="Media">Media</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
        <div>
          <label class="mb-1.5 block text-sm font-bold text-slate-500" for="task-due">Prazo</label>
          <input class="h-11 w-full rounded-md border border-slate-300 px-3 outline-none focus:border-fiap focus:ring-2 focus:ring-fiap/20" id="task-due" type="date" />
        </div>
        <button class="h-11 rounded-md bg-fiap px-5 font-extrabold text-white transition hover:bg-fiap-dark" id="add-task" type="button">Adicionar</button>
      </section>

      <section class="mb-5 grid gap-3 md:grid-cols-2" aria-label="Separacao por importancia">
        <article class="rounded-lg border border-slate-300 p-4">
          <h2 class="text-xl font-black uppercase text-fiap">Importante</h2>
          <p class="mt-2 text-slate-500">Provas, entregas, trabalhos valendo nota e tarefas com prazo curto.</p>
        </article>
        <article class="rounded-lg border border-slate-300 p-4">
          <h2 class="text-xl font-black uppercase text-fiap">Nao importante</h2>
          <p class="mt-2 text-slate-500">Organizacao extra, revisoes sem cobranca imediata e ajustes cosmeticos.</p>
        </article>
      </section>

      <section class="grid overflow-hidden border-2 border-slate-300 xl:grid-cols-[repeat(3,minmax(12rem,1fr))_minmax(13rem,0.8fr)]" aria-label="Quadro Kanban">
        <div class="p-4 xl:p-5" data-column="todo">
          <h2 class="mb-5 text-center text-xl font-black uppercase text-fiap">To Do</h2>
          <div class="task-list grid min-h-[clamp(10rem,35vh,32rem)] content-start gap-3" id="todo" aria-label="Tarefas para fazer"></div>
        </div>

        <div class="border-t-2 border-dashed border-slate-300 p-4 xl:border-l-2 xl:border-t-0 xl:p-5" data-column="doing">
          <h2 class="mb-5 text-center text-xl font-black uppercase text-fiap">Doing</h2>
          <div class="task-list grid min-h-[clamp(10rem,35vh,32rem)] content-start gap-3" id="doing" aria-label="Tarefas em andamento"></div>
        </div>

        <div class="border-t-2 border-dashed border-slate-300 p-4 xl:border-l-2 xl:border-t-0 xl:p-5" data-column="done">
          <h2 class="mb-5 text-center text-xl font-black uppercase text-fiap">Done</h2>
          <div class="task-list grid min-h-[clamp(10rem,35vh,32rem)] content-start gap-3" id="done" aria-label="Tarefas concluidas"></div>
        </div>

        <aside class="grid gap-5 border-t-2 border-dashed border-slate-300 p-4 xl:grid-rows-2 xl:border-l-2 xl:border-t-0 xl:p-5">
          <section class="border-2 border-slate-300 p-3">
            <h2 class="text-xl font-black uppercase text-fiap">Impedimentos</h2>
            <textarea class="mt-4 min-h-[clamp(8rem,22vh,14rem)] w-full resize-y rounded-md border border-slate-300 p-3 outline-none focus:border-fiap focus:ring-2 focus:ring-fiap/20" id="blockers" placeholder="Ex: falta material, duvida com professor, grupo nao respondeu"></textarea>
          </section>
          <section class="grid content-start gap-3 border-2 border-slate-300 p-3">
            <h2 class="text-center text-xl font-black uppercase text-fiap">DoD</h2>
            <label class="grid grid-cols-[22px_1fr] items-center gap-2 text-sm font-bold"><input type="checkbox" /> Revisei antes de entregar</label>
            <label class="grid grid-cols-[22px_1fr] items-center gap-2 text-sm font-bold"><input type="checkbox" /> Esta no formato pedido</label>
            <label class="grid grid-cols-[22px_1fr] items-center gap-2 text-sm font-bold"><input type="checkbox" /> Enviei no lugar certo</label>
            <label class="grid grid-cols-[22px_1fr] items-center gap-2 text-sm font-bold"><input type="checkbox" /> Confirmei o prazo</label>
          </section>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
